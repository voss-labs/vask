name: deploy

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    # Upstream-only — never runs on forks even if they push tags.
    if: github.repository == 'voss-labs/vask'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download release binary
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          mkdir -p /tmp/dist
          gh release download "$TAG" \
            --pattern 'vask.linux-amd64' \
            --dir /tmp/dist
          chmod +x /tmp/dist/vask.linux-amd64

      - name: stage env file
        run: |
          umask 077
          mkdir -p /tmp/dist
          cat > /tmp/dist/turso.env <<EOF
          TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}
          CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}
          CF_AI_TOKEN=${{ secrets.CF_AI_TOKEN }}
          EOF

      - name: scp artifacts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          port: ${{ secrets.ORACLE_SSH_PORT }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "/tmp/dist/vask.linux-amd64,/tmp/dist/turso.env,deploy/vask.service"
          target: "/tmp/"
          strip_components: 2

      - name: install + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          port: ${{ secrets.ORACLE_SSH_PORT }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -euo pipefail
            sudo install -o vask -g vask -m 0755 /tmp/vask.linux-amd64 /opt/vask/vask
            sudo install -o vask -g vask -m 0600 /tmp/turso.env       /opt/vask/data/turso.env
            sudo mv /tmp/vask.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl restart vask
            sleep 2
            sudo systemctl status vask --no-pager -l --lines=10
