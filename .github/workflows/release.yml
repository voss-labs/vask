name: release

# Triggered by:
#   - tag push v*.*.*       → test → build → deploy → smoke → release
#   - manual dispatch       → test → build → deploy → smoke   (no release)
#
# release runs LAST, gated on smoke passing. That way "this Release
# exists on GitHub" implies "this Release is live and verified" — not
# just "the binary built fine".
#
# Sequential pipeline; each stage is a separate job with needs:.
# Failure at any stage stops the chain.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Default to no permissions; jobs grant only what they need.
permissions: {}

# upload-artifact / download-artifact at v4 are still Node 20-based;
# this env var opts them into the Node 24 runtime to silence deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    if: github.repository == 'voss-labs/vask'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -timeout 60s

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
      - name: cross-compile
        run: |
          mkdir -p bin
          for arch in amd64 arm64; do
            for cmd in vask vask-embed-backfill; do
              GOOS=linux GOARCH=$arch \
                go build -trimpath -ldflags="-s -w" \
                  -o "bin/${cmd}.linux-${arch}" "./cmd/${cmd}"
            done
          done
          ls -lh bin/
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: binaries
          path: bin/
      - name: stage deploy artifacts
        run: |
          # NOTE: do NOT umask 077 here. scp-action runs in a Docker
          # container under a different UID; if staged/ is mode 700 the
          # container can't list it and drone-scp produces an empty tar
          # ("tar: empty archive"). The runner workspace is ephemeral
          # anyway — secret protection happens on the remote VM, where
          # turso.env is written with `install -m 0600 -o vask -g vask`.
          mkdir -p staged
          cp bin/vask.linux-amd64 staged/vask.linux-amd64
          cp deploy/vask.service  staged/vask.service
          cat > staged/turso.env <<EOF
          TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}
          CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}
          CF_AI_TOKEN=${{ secrets.CF_AI_TOKEN }}
          EOF
          chmod 755 staged
          chmod 644 staged/*
          ls -la staged/
      - name: scp to oracle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          port: ${{ secrets.ORACLE_SSH_PORT }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          # comma-separated explicit paths (the action does NOT shell-glob;
          # passing "staged/*" silently produces an empty tar)
          source: "staged/vask.linux-amd64,staged/vask.service,staged/turso.env"
          target: "/tmp/"
          strip_components: 1
      - name: install + restart
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.ORACLE_SSH_HOST }}
          port: ${{ secrets.ORACLE_SSH_PORT }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -euo pipefail
            sudo install -o vask -g vask -m 0755 /tmp/vask.linux-amd64 /opt/vask/vask
            sudo install -o vask -g vask -m 0600 /tmp/turso.env       /opt/vask/data/turso.env
            sudo mv /tmp/vask.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl restart vask
            sleep 2
            sudo systemctl status vask --no-pager -l --lines=10

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: probe IP + domain
        run: |
          set -e
          sleep 3

          probe() {
            local label="$1" host="$2"
            if ! nc -z -w 10 "$host" 22; then
              echo "::error::tcp/22 unreachable at $label ($host)"
              return 1
            fi
            local banner
            banner=$(echo "" | nc -w 5 "$host" 22 2>&1 | head -1 | tr -d '\r')
            if echo "$banner" | grep -q "SSH-2"; then
              echo "::notice::$label OK — banner: $banner"
              return 0
            fi
            echo "::error::$label answered tcp/22 but no SSH-2 banner: $banner"
            return 1
          }

          probe "IP"     "${{ secrets.ORACLE_SSH_HOST }}"
          probe "domain" "vask.vosslabs.org" || \
            echo "::warning::domain probe failed — likely DNS not yet propagated"

  release:
    needs: smoke
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write     # softprops/action-gh-release needs this
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binaries
          path: bin/
      - uses: softprops/action-gh-release@v3
        with:
          files: bin/*
          generate_release_notes: true
